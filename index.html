<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="FocusFlow"/>
  <meta name="theme-color" content="#F06E8A"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>FocusFlow</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{--pink:#F06E8A;--pink-bg:#FDE8ED;--bg:#F7F5F2;--white:#fff;--text:#1A1A1A;--muted:#A0948A;--line:#E8E0D8;}
    html,body{height:100%;overflow:hidden;background:var(--bg);}
    body{font-family:-apple-system,'Hiragino Sans',sans-serif;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
    input,select,button,textarea{font-family:inherit;}
    #app{height:100%;display:flex;flex-direction:column;overflow:hidden;}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
